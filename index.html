<!doctype html>
<html>
<head>
  <title>Finance Agent</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
    h1 { color: #333; }
    input { width: 100%; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; background: #0f766e; color: white; border: none; cursor: pointer; margin-top: 10px; }
    pre { background: #f0f0f0; padding: 20px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Finance Intelligence Agent</h1>
  <input id="input" type="text" value="review expense reports">
  <button onclick="send()">Send</button>
  <pre id="output">Ready</pre>
  
  <script>
    async function send() {
      const text = document.getElementById('input').value;
      const output = document.getElementById('output');
      output.textContent = 'Loading...';
      
      try {
        const res = await fetch('https://merry-elegance.up.railway.app/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        output.textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
